<!-- Sidebar: desktop always visible, mobile slide-in -->
<aside
  [class]="isOpen
    ? 'fixed inset-y-0 left-0 z-30 flex flex-col w-64 bg-white border-r border-gray-200 shadow-lg transform translate-x-0 transition-transform duration-300 ease-in-out lg:relative lg:translate-x-0 lg:h-full'
    : 'fixed inset-y-0 left-0 z-30 flex flex-col w-64 bg-white border-r border-gray-200 shadow-lg transform -translate-x-full transition-transform duration-300 ease-in-out lg:relative lg:translate-x-0 lg:h-full'">

  <!-- Logo / Brand -->
  <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
    <div routerLink="" class="flex items-center gap-3 cursor-pointer">
      <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
      </div>
      <span class="text-lg font-bold text-gray-800 tracking-tight">Drona TaskFlow</span>
    </div>
    <!-- Close button (mobile only) -->
    <button
      (click)="closeSidebar.emit()"
      class="lg:hidden p-1 rounded-md text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-3 py-5 space-y-1 overflow-y-auto">
    <p class="px-3 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-widest">Main Menu</p>

    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-blue-50 text-blue-600 font-semibold"
        [routerLinkActiveOptions]="{ exact: false }"
        (click)="closeSidebar.emit()"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors duration-150 text-sm">
        <span class="flex-shrink-0" [innerHTML]="item.icon"></span>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- User profile at bottom -->
  <div class="px-4 py-4 border-t border-gray-100">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-sm flex-shrink-0">
        {{initials}}
      </div>
      <div class="min-w-0">
        <p class="text-sm font-semibold text-gray-800 truncate">{{Employee_Name}}</p>
        <p class="text-xs text-gray-400 truncate">{{Designation}}</p>
      </div>
    </div>
  </div>

</aside>
