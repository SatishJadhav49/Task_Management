  <!-- Right: Actions -->
  <div class="flex items-center gap-2 sm:gap-3">

    <!-- Team selector: visible for managers in team view -->
    @if (showTeamSelector) {
      <div class="flex items-center gap-2 px-3 py-2 rounded-lg border border-indigo-200 bg-indigo-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-indigo-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        @if (hasMultipleTeams) {
          <select
            [(ngModel)]="selectedTeamId"
            (ngModelChange)="onTeamChange()"
            class="text-sm font-semibold text-indigo-700 bg-transparent outline-none cursor-pointer">
            <option [ngValue]="0">All Teams</option>
            @for (team of userTeams; track team.Team_ID) {
              <option [ngValue]="team.Team_ID">{{ team.Team_Name }}</option>
            }
          </select>
        } @else {
          <span class="text-sm font-semibold text-indigo-700">{{ selectedTeamName }}</span>
        }
      </div>
    }

    @if (canToggleRoleMode) {
      <button
        (click)="onRoleToggle()"
        class="flex items-center gap-2 px-3 py-2 rounded-lg border text-sm font-semibold transition-all"
        [class]="isRoleModeEnabled ? 'border-blue-200 bg-blue-50 text-blue-700' : 'border-gray-200 bg-white text-gray-600 hover:bg-gray-50'">

        <span class="hidden sm:block">{{ roleToggleLabel }}</span>
        <span class="text-xs px-2 py-0.5 rounded-full"
          [class]="isRoleModeEnabled ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-600'">
          {{ roleToggleHint }}
        </span>
         <div class="relative">
          <div class="w-9 h-5 rounded-full transition-colors duration-200"
            [class]="isRoleModeEnabled ? 'bg-blue-600' : 'bg-gray-300'"></div>
          <div class="absolute top-0.5 h-4 w-4 rounded-full bg-white shadow transition-transform duration-200"
            [class]="isRoleModeEnabled ? 'translate-x-4 left-0.5' : 'translate-x-0 left-0.5'"></div>
        </div>
      </button>
    }
